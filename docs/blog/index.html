<body>

  <!-- HEADER — same structure as home -->
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">READ_SPACE</div>
      <nav class="nav-links">
        <a href="/">Home</a>
        <a href="/blog/" aria-current="page">Blog</a>
      </nav>
    </div>
  </header>

  <!-- BLOG LAYOUT -->
  <main class="blog-shell">
    <div class="blog-layout">

      <!-- LEFT: sidebar -->
      <aside class="blog-left" id="sidebar">
        <div class="sidebar-handle">
          <button id="toggleSidebar" aria-label="Toggle sidebar">⟨</button>
        </div>
        <div class="sidebar-content">
          <p class="sidebar-label">LOGS</p>
          <ul class="series-list"></ul>
        </div>
      </aside>

      <!-- RIGHT: post viewer -->
      <article class="blog-right" id="viewer">
        <p class="placeholder">Select a log from the left.</p>
      </article>

    </div>
  </main>

  <!-- DOTS BACKGROUND — same as home -->
  <canvas id="dots" aria-hidden="true"></canvas>

  <script src="../js/dots.js" defer></script>
  <script src="blog.js"></script>
